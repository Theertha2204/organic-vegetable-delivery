<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Checkout</title>
<link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="navbar">
    <a href="/">Home</a>
    <a href="/cart">Cart</a>
    <a href="/products">Products</a>
</div>

<div class="checkout-container">

    <h2 class="checkout-title">🧾 Checkout</h2>

    <form action="/place-order" method="post" class="checkout-form">

        <div class="form-group">
            <label>Full Name</label>
            <input type="text" name="customerName" placeholder="Enter your name" required>
        </div>

        <div class="form-group">
            <label>Phone Number</label>
            <input type="text" name="phone" placeholder="Enter your phone number" required>
        </div>

        <div class="form-group">
            <label>Delivery Address</label>
            <textarea name="address" placeholder="Enter your address" required></textarea>
        </div>

        <div class="form-group">
            <label>Total Amount</label>
            <input type="number" step="0.01" name="totalAmount" placeholder="Total amount" required>
        </div>

        <button type="submit" class="place-order-btn">Place Order</button>

    </form>

</div>

</body>
</html>
