<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Add Product</title>
</head>
<body>
<h2>Add New Product</h2>
<form action="/admin/save-product" method="post">
<input type="text" name="name" placeholder="Product Name" required><br><br>
<input type="text" name="description" placeholder="Description" required><br><br>
<input  type="number"  step="0.01" name="price" placeholder="Price" required><br><br>
<input  type="number" name="stock" placeholder="Stock" required><br><br>
<input  type="text" name="imageUrl" placeholder="Image URL" required><br><br>
<label>Organic:</label>
<input  type="checkbox" name="organic"><br><br>
<button type="submit">Save Product</button>

</form>
</body>
</html>
